name: Build AntiDarkSword (TrollStore)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  build:
    name: Compile Dylib
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: theos
          submodules: recursive
          
      - name: Download iOS SDK
        run: |
          git clone -n --depth=1 --filter=tree:0 https://github.com/theos/sdks.git
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mv iPhoneOS16.5.sdk ${{ github.workspace }}/theos/sdks/
          
      - name: Install Dependencies
        run: brew install ldid
          
      - name: Build Tweak
        run: |
          export THEOS="${{ github.workspace }}/theos"
          make clean
          make FINALPACKAGE=1
          
      # Extracts the file from the hidden folder to make the next steps flawless
      - name: Move Dylib to Workspace
        run: find .theos/obj -name "*.dylib" -exec cp {} . \;
          
      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AntiDarkSwordUI.dylib
          path: "*.dylib" 
          if-no-files-found: error

      # Creates a formal, numbered release on the repo homepage
      - name: Create Auto-Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "AntiDarkSword (TrollStore) - Build ${{ github.run_number }}"
          body: "Automated build compiled directly from the main branch. Download the `.dylib` below and inject using TrollFools."
          prerelease: false
          make_latest: true
          files: "*.dylib"
